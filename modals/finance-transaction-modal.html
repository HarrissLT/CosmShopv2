    <div id="financeTransactionModal" class="modal">
        <div class="modal-content medium">
            <span class="close-button">×</span>
            <h2 id="financeTransactionModalTitleElem">Thêm Giao Dịch Mới</h2>
            <form id="financeTransactionForm">
                <input type="hidden" id="transactionId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="transactionType">Loại Giao Dịch <span class="required">*</span></label>
                        <select id="transactionType" required>
                            <option value="expense">Chi</option>
                            <option value="income">Thu</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="transactionDate">Ngày Giao Dịch <span class="required">*</span></label>
                        <input type="date" id="transactionDate" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="transactionAmount">Số Tiền <span class="required">*</span></label>
                    <input type="text" id="transactionAmount" class="currency-input" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label for="transactionDescription">Mô Tả <span class="required">*</span></label>
                    <textarea id="transactionDescription" rows="2" required placeholder="VD: Chi tiền điện tháng 5, Thu tiền bán hàng..."></textarea>
                </div>
                <div id="transactionCategoryGroup" class="form-group">
                    <label for="transactionCategory">Danh Mục</label>
                    <select id="transactionCategory">
                        <option value="">-- Chọn danh mục --</option>
                        <!-- Categories will be populated by JS -->
                    </select>
                    <input type="text" id="transactionCategoryCustom" placeholder="Hoặc nhập danh mục mới" style="margin-top: 5px; display: none;">
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelFinanceTransactionModalBtn" class="btn btn-secondary">Hủy</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu Giao Dịch</button>
                </div>
            </form>
        </div>
    </div>
